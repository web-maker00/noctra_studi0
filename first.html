<!DOCTYPE html>
<html lang="zh">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>暮尘工作室</title>  

<style>  
body{  
  margin:0;  
  font-family:Arial;  
  color:#fff;  
  height:100vh;  
  background:url('bg.jpg') no-repeat center;  
  background-size:cover;  
  display:flex;  
  justify-content:center;  
  align-items:center;  
  text-align:center;  
  position:relative;  
}  

/* 暗层 */  
body::before{  
  content:"";  
  position:absolute;  
  width:100%;  
  height:100%;  
  background:rgba(0,0,0,0.65);  
  backdrop-filter:blur(2px);  
  z-index:0;  
}  

.main{  
  position:relative;  
  z-index:1;  
}  

/* 标题 */  
h1{  
  font-size:42px;  
  margin-bottom:10px;  
  color:#ff9e57;  
  letter-spacing:3px;  
}  

/* 副标题 */  
.subtitle{  
  font-size:18px;  
  color:#ccc;  
  margin-bottom:40px;  
}  

/* 按钮容器（关键：让按钮居中+排列整齐） */
.btn-group{
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* 按钮 */  
.enter-btn, .web-btn, .contact-btn{  
  padding:12px 30px;  
  font-size:16px;  
  border:none;  
  border-radius:30px;  
  background:#ff9e57;  
  color:#000;  
  cursor:pointer;  
  transition:0.3s;  
  margin:8px 0;  
  width:200px;
}  

.enter-btn:hover, .web-btn:hover, .contact-btn:hover{  
  background:#ffb27a;  
  transform:scale(1.05);  
}  

/* 淡入动画 */  
.fade-in{  
  animation:fadeIn 1.5s ease;  
}  

@keyframes fadeIn{  
  from{opacity:0; transform:translateY(20px);}  
  to{opacity:1; transform:translateY(0);}  
}  
</style>  
</head>  

<body>  

<div class="main fade-in">  
  <h1>暮尘工作室</h1>  
  <div class="subtitle">沉于尘，胜于局</div>  

  <div class="btn-group">
    <button class="enter-btn" onclick="enterService()">陪玩服务</button>
    <button class="web-btn" onclick="enterWeb()">网页制作</button>
    <button class="contact-btn" onclick="contact()">联系客服</button>
  </div>

</div>  

<script>  
function enterService(){  
  window.location.href = "play.html";  
}  

function enterWeb(){  
  window.location.href = "webmaker.html";  
}  

function contact(){  
  window.location.href = "https://wa.me/60187838858";  
}
</script>  

</body>  
</html>
